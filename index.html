<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>christian mack</h1>
        <nav>
            <a href="#about">about</a> |
            <a href="#projects">Projects</a> |
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <main>
        <section id="about">
            <h2>About Me</h2>
            <p>iam pretty awsome</p>
        </section>
        <section id="projects">
            <h2>Projects</h2>
            <ul>
                <li><strong>Project 1:</strong>lets just say its awsome</li>
                <li><strong>Project 2:</strong> lets just say its awsomer</li>
            </ul>
        </section>
        <section id="gallery">
            <h2>Image Gallery</h2>
            <div class="gallery">
                <img src="image/sample1.jpg" alt="Sample 1" />
                <img src="image/sample2.jpg" alt="Sample 2" />
                <img src="image/sample3.jpg" alt="Sample 3" />
            </div>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <form class="contact-form" id="contactForm">
                <input type="text" name="name" placeholder="Your Name" required />
                <input type="email" name="email" placeholder="Your Email" required />
                <textarea name="message" placeholder="Your Message" rows="4" required></textarea>
                <button type="submit">Send</button>
            </form>
            <p id="contactMsg" style="text-align:center;"></p>
        </section>
    </main>
    <button class="theme-switcher" id="themeSwitcher" title="Switch theme">🌙</button>
    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>
</body>
</html>
